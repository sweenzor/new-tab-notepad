name: Deploy to Chrome Web Store

on:
  push:
    tags: ['v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: zip -X new-tab-notepad.zip manifest.json start-page.html new-tab.css tab.js icon16.png icon48.png icon128.png

      - name: Upload and publish
        run: npx --yes chrome-webstore-upload-cli@3 upload --source new-tab-notepad.zip --auto-publish
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
